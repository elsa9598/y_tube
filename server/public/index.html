<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>오둥이 하루 — 렌더 & 업로드</title>
<style>
  :root{
    --bg:#0A0B0E; --surface:#14161B; --surfaceAlt:#1B1E25; --stroke:#252932;
    --accent:#FB6357; --accentSoft:#FFB4AC; --blue:#3B82F6;
    --txt:#F2F4F7; --dim:#8A95A3; --faint:#5C6473;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;padding:32px 16px;min-height:100vh}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
  .sub{color:var(--dim);font-size:13px;margin-bottom:28px}
  .card{background:var(--surface);border:1px solid var(--stroke);border-radius:16px;
    padding:22px;margin-bottom:18px}
  .drop{border:2px dashed var(--stroke);border-radius:14px;padding:34px 20px;text-align:center;
    cursor:pointer;transition:.15s;color:var(--dim)}
  .drop.hot{border-color:var(--accentSoft);background:var(--surfaceAlt);color:var(--txt)}
  .drop b{color:var(--txt)}
  .files{display:flex;gap:12px;margin-top:14px}
  .pill{flex:1;background:var(--surfaceAlt);border:1px solid var(--stroke);border-radius:10px;
    padding:12px 14px;font-size:13px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pill.ok{border-color:rgba(255,180,172,.4);color:var(--txt)}
  button{background:var(--accent);color:#fff;border:0;border-radius:12px;padding:15px 22px;
    font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:.15s}
  button:disabled{background:var(--surfaceAlt);color:var(--faint);cursor:not-allowed}
  button.alt{background:var(--blue)}
  .bar{height:8px;background:var(--surfaceAlt);border-radius:6px;overflow:hidden;margin:12px 0 8px}
  .bar>i{display:block;height:100%;background:var(--blue);width:0;transition:width .3s}
  .bar.up>i{background:var(--accent)}
  .msg{font-size:12.5px;color:var(--dim)}
  .pct{float:right;font-weight:800;color:var(--accentSoft)}
  label{display:block;font-size:13px;font-weight:600;margin:16px 0 7px}
  input[type=text],textarea,select{width:100%;background:var(--surface);color:var(--txt);
    border:1px solid var(--stroke);border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit}
  textarea{resize:vertical;min-height:84px}
  video{width:100%;border-radius:12px;margin-bottom:6px;background:#000}
  a.yt{display:inline-block;margin-top:12px;color:var(--accentSoft);font-weight:700;font-size:15px}
  .hide{display:none}
  .step{font-size:11px;letter-spacing:1.5px;color:var(--faint);font-weight:600;margin-bottom:10px}
  .fmt{background:var(--surfaceAlt);border:1px solid var(--stroke);border-radius:10px;
    padding:12px 14px;font-size:13.5px;cursor:pointer;display:flex;align-items:center;gap:8px}
  .fmt:has(input:checked){border-color:var(--accentSoft);color:var(--txt)}
  input[type=number]{width:100%;background:var(--surface);color:var(--txt);
    border:1px solid var(--stroke);border-radius:10px;padding:12px 14px;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <h1>오둥이 하루</h1>
  <div class="sub">이미지 + mp3 + JSON 첨부 → 16:9 렌더링 → 유튜브 업로드</div>

  <!-- STEP 1: 자산 -->
  <div class="card" id="cardPick">
    <div class="step">STEP 01 · 에셋</div>
    <div class="drop" id="drop">
      <b>이미지 + mp3 + JSON 파일 3개를 끌어다 놓거나</b><br/>클릭해서 선택
      <input id="file" type="file" accept=".png,.jpg,.jpeg,.webp,.gif,.mp3,.json" multiple class="hide" />
    </div>
    <div class="files">
      <div class="pill" id="pImg">이미지 — 미선택</div>
      <div class="pill" id="pMp3">mp3 — 미선택</div>
      <div class="pill" id="pJson">json — 미선택</div>
    </div>
    <label>포맷</label>
    <div style="display:flex;gap:10px">
      <label class="fmt" style="flex:1"><input type="radio" name="fmt" value="normal" checked /> 일반 16:9</label>
      <label class="fmt" style="flex:1"><input type="radio" name="fmt" value="shorts" /> 쇼츠 9:16 (30초)</label>
    </div>
    <div id="shortsOpt" class="hide" style="margin-top:10px">
      <label>쇼츠 시작 지점 (초) — 이 시점부터 30초</label>
      <input type="number" id="shortsStart" min="0" step="1" value="60" />
    </div>
    <div style="margin-top:16px">
      <button id="btnRender" disabled>렌더링 시작</button>
    </div>
  </div>

  <!-- STEP 2: 렌더 진행 -->
  <div class="card hide" id="cardRender">
    <div class="step">STEP 02 · 리모션 렌더링</div>
    <div><span class="pct" id="rPct">0%</span><span id="rState">대기</span></div>
    <div class="bar"><i id="rBar"></i></div>
    <div class="msg" id="rMsg">—</div>
  </div>

  <!-- STEP 3: 업로드 -->
  <div class="card hide" id="cardUp">
    <div class="step">STEP 03 · 유튜브 업로드</div>
    <video id="preview" controls class="hide"></video>
    <label>동영상 제목 (필수)</label>
    <input type="text" id="title" maxlength="100" placeholder="제목" />
    <label>설명</label>
    <textarea id="desc" maxlength="5000" placeholder="설명"></textarea>
    <label>태그 (쉼표로 구분)</label>
    <input type="text" id="tags" placeholder="오둥이, cartoon music, lofi" />
    <label>공개 상태</label>
    <select id="privacy">
      <option value="public">공개</option>
      <option value="unlisted">일부 공개</option>
      <option value="private" selected>비공개</option>
    </select>
    <div style="margin-top:18px">
      <button class="alt" id="btnUpload">유튜브에 업로드</button>
    </div>
    <div class="bar up hide" id="uWrap"><i id="uBar"></i></div>
    <div class="msg" id="uMsg"></div>
    <a class="yt hide" id="ytLink" target="_blank" rel="noopener"></a>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let imgFile = null, mp3File = null, jsonFile = null, jobId = null;

/* ---- 파일 선택 ---- */
const drop = $("drop"), fileInput = $("file");
drop.onclick = () => fileInput.click();
["dragover","dragenter"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add("hot")}));
["dragleave","drop"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove("hot")}));
drop.addEventListener("drop", ev => handleFiles(ev.dataTransfer.files));
fileInput.addEventListener("change", () => handleFiles(fileInput.files));

function handleFiles(list){
  for(const f of list){
    const n = f.name.toLowerCase();
    if(/\.(png|jpe?g|webp|gif)$/.test(n)) imgFile = f;
    else if(n.endsWith(".mp3")) mp3File = f;
    else if(n.endsWith(".json")) jsonFile = f;
  }
  $("pImg").textContent = imgFile ? "이미지 · " + imgFile.name : "이미지 — 미선택";
  $("pImg").classList.toggle("ok", !!imgFile);
  $("pMp3").textContent = mp3File ? "mp3 · " + mp3File.name : "mp3 — 미선택";
  $("pMp3").classList.toggle("ok", !!mp3File);
  $("pJson").textContent = jsonFile ? "json · " + jsonFile.name : "json — 미선택";
  $("pJson").classList.toggle("ok", !!jsonFile);
  $("btnRender").disabled = !(imgFile && mp3File && jsonFile);
  /* 제목 미리보기: JSON.title */
  if(jsonFile){
    const r = new FileReader();
    r.onload = () => {
      try{
        const j = JSON.parse(String(r.result));
        if(j && j.title) $("title").value = String(j.title);
      }catch(e){ /* JSON 파싱 실패 무시 */ }
    };
    r.readAsText(jsonFile);
  }
}

/* ---- 포맷 선택 ---- */
document.querySelectorAll('input[name=fmt]').forEach(r=>{
  r.addEventListener("change", ()=>{
    const shorts = document.querySelector('input[name=fmt]:checked').value === "shorts";
    $("shortsOpt").classList.toggle("hide", !shorts);
  });
});

/* ---- 렌더 ---- */
$("btnRender").onclick = async () => {
  $("btnRender").disabled = true;
  $("cardRender").classList.remove("hide");
  const fd = new FormData();
  fd.append("image", imgFile);
  fd.append("mp3", mp3File);
  fd.append("json", jsonFile);
  fd.append("title", $("title").value.trim());
  const fmt = document.querySelector('input[name=fmt]:checked').value;
  fd.append("mode", fmt);
  if(fmt === "shorts") fd.append("shortsStart", $("shortsStart").value || "60");
  const r = await fetch("/render", { method:"POST", body:fd });
  const j = await r.json();
  if(!j.jobId){ $("rMsg").textContent = "오류: "+JSON.stringify(j); return; }
  jobId = j.jobId;
  pollRender();
};

async function pollRender(){
  try{
    const s = await (await fetch("/status/"+jobId)).json();
    const p = Math.round(s.progress||0);
    $("rPct").textContent = p+"%";
    $("rBar").style.width = p+"%";
    $("rState").textContent = s.state||"";
    $("rMsg").textContent = s.message||"";
    if(s.state === "done"){
      $("preview").src = "/download/"+jobId;
      $("preview").classList.remove("hide");
      $("cardUp").classList.remove("hide");
      $("cardUp").scrollIntoView({behavior:"smooth"});
      return;
    }
    if(s.state === "error"){ $("rMsg").textContent = "❌ "+(s.message||"렌더 실패"); return; }
  }catch(e){ /* 일시 오류 무시 */ }
  setTimeout(pollRender, 2000);
}

/* ---- 업로드 ---- */
$("btnUpload").onclick = async () => {
  const title = $("title").value.trim();
  if(!title){ alert("제목을 입력하세요"); return; }
  $("btnUpload").disabled = true;
  $("uWrap").classList.remove("hide");
  const body = {
    title,
    description: $("desc").value,
    tags: $("tags").value.split(",").map(s=>s.trim()).filter(Boolean),
    privacyStatus: $("privacy").value,
  };
  const r = await fetch("/upload/"+jobId, {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
  });
  const j = await r.json();
  if(!j.started){ $("uMsg").textContent = "오류: "+JSON.stringify(j); $("btnUpload").disabled=false; return; }
  pollUpload();
};

async function pollUpload(){
  try{
    const s = await (await fetch("/status/"+jobId)).json();
    const u = s.upload;
    if(u){
      const p = Math.round(u.progress||0);
      $("uBar").style.width = p+"%";
      $("uMsg").textContent = p+"% · "+(u.message||"");
      if(u.state === "done"){
        $("uMsg").textContent = "✅ 업로드 완료";
        const a = $("ytLink");
        a.href = u.url; a.textContent = "▶ "+u.url;
        a.classList.remove("hide");
        return;
      }
      if(u.state === "error"){ $("uMsg").textContent = "❌ "+(u.message||"업로드 실패"); $("btnUpload").disabled=false; return; }
    }
  }catch(e){}
  setTimeout(pollUpload, 2000);
}
</script>
</body>
</html>
